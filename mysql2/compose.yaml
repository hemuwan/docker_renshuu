version: "3.9"

services:
  mysql:
    build: ./mysql
    container_name: mysql-container
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: sample_db
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"

  node:
    build: ./node
    container_name: node-container
    depends_on:
      - mysql
    env_file:
      - .env
    ports:
      - "3000:3000"